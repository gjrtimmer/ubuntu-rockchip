# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# This project only adopted Conventional Commits recently, so the vast majority
# of history is freeform ("Add ...", "Fix ...", "Bump ...", "Remove ...").
# The [git].commit_parsers below are split into two tiers:
#
#   1. Conventional Commit types (feat:, fix:, ...) — matched first.
#   2. Legacy heuristics — case-insensitive leading-verb rules that classify the
#      pre-conventional history (Add -> Features, Fix -> Bug Fixes, Bump/Update ->
#      Dependencies, Remove -> Removed, ...).
#
# `filter_unconventional = false` keeps non-conventional commits, and the final
# catch-all parser routes anything unmatched into "Other" so nothing is lost.

[changelog]
# Rendered once, at the top of the file.
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/), and the
project adheres to [Semantic Versioning](https://semver.org/).

> **Note:** commits made before this project adopted
> [Conventional Commits](https://www.conventionalcommits.org/) are categorized
> heuristically by their leading verb (e.g. *Add* → Features, *Fix* → Bug Fixes,
> *Bump*/*Update* → Dependencies), so older sections are best-effort.
\n
"""

# Rendered once per release/version.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}]\
        {% if release_link %}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**({{ commit.scope }})** {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | split(pat="\n") | first | upper_first }} \
            ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/gjrtimmer/ubuntu-rockchip/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""

# Rendered once, at the bottom of the file.
footer = """
<!-- generated by git-cliff -->
"""

trim = true

[git]
# Parse the commits based on https://www.conventionalcommits.org/, but do NOT
# drop the ones that don't match (this repo is mostly pre-conventional).
conventional_commits = true
filter_unconventional = false
split_commits = false

# Tidy up messages before parsing/grouping.
commit_preprocessors = [
    # Collapse trailing whitespace.
    { pattern = '\s+$', replace = "" },
    # Linkify "#123" issue/PR references against the fork.
    { pattern = '\(#(\d+)\)', replace = "([#${1}](https://github.com/gjrtimmer/ubuntu-rockchip/issues/${1}))" },
]

# First match wins. Conventional types first, then legacy-verb heuristics, then
# a catch-all. The <!-- N --> prefixes only control sort order and are stripped
# from the rendered headings.
commit_parsers = [
    # --- release/merge noise: drop it entirely ---
    { message = "(?i)^(prep|prepare|update|bump).*(next release|for release|for the next release)", skip = true },
    { message = "(?i)^(prep|prepare)\\b", skip = true },
    { message = "(?i)^merge ", skip = true },
    { message = "(?i)^squash\\b", skip = true },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore\\(deps\\)", group = "<!-- 5 -->⬆️ Dependencies & Updates" },

    # --- Conventional Commits (current convention) ---
    { message = "^feat", group = "<!-- 0 -->⛰️ Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
    { message = "^refactor", group = "<!-- 2 -->🚜 Refactor & Cleanup" },
    { message = "^docs?", group = "<!-- 3 -->📚 Documentation" },
    { message = "^test", group = "<!-- 6 -->🧪 Testing" },
    { message = "^(ci|build)", group = "<!-- 7 -->⚙️ CI & Build" },
    { message = "^style", group = "<!-- 8 -->🎨 Styling" },
    { message = "^chore", group = "<!-- 9 -->🧹 Miscellaneous" },
    { message = "^revert", group = "<!-- 11 -->◀️ Reverts" },

    # --- Legacy freeform history (pre-conventional), by leading verb ---
    { message = "(?i)^(add|create|introduce|implement|enable|support|allow)\\b", group = "<!-- 0 -->⛰️ Features" },
    { message = "(?i)^(fix|correct|resolve|repair|patch|workaround|suppress|handle)\\b", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "(?i)^(bump|update|upgrade)\\b", group = "<!-- 5 -->⬆️ Dependencies & Updates" },
    { message = "(?i)^(remove|delete|drop|disable|stop|revert)\\b", group = "<!-- 10 -->🗑️ Removed & Reverted" },
    { message = "(?i)^(refactor|cleanup|clean up|rename|move|improve|simplify|use|set|change|make|increase|decrease|run|install|upload|build|prep)\\b", group = "<!-- 2 -->🚜 Refactor & Cleanup" },
    { message = "(?i)^(test)\\b", group = "<!-- 6 -->🧪 Testing" },
    { message = "(?i)^(doc|readme)\\b", group = "<!-- 3 -->📚 Documentation" },
    { message = "(?i)^release\\b", skip = true },

    # --- catch-all: keep, but bucket under "Other" ---
    { message = "^.*", group = "<!-- 12 -->❓ Other" },
]

# Process tags matching this regex (the project's vX.Y[.Z] scheme).
tag_pattern = "v[0-9].*"

# Sort newest release first, newest commit first within a release.
sort_commits = "newest"
topo_order = false
