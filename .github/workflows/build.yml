name: Build

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board to build (a single board name, or 'all')"
        default: all
        type: string
      suite:
        description: "Ubuntu suite"
        default: all
        type: choice
        options:
          - all
          - jammy
          - noble
      flavor:
        description: "Flavor"
        default: all
        type: choice
        options:
          - all
          - server
          - desktop

run-name: Build

jobs:
  config:
    runs-on: ubuntu-latest
    name: Create matrix
    outputs:
      build_matrix: ${{ steps.gen.outputs.build_matrix }}
      rootfs_matrix: ${{ steps.gen.outputs.rootfs_matrix }}
      kernel_matrix: ${{ steps.gen.outputs.kernel_matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Generate matrices
        id: gen
        env:
          IN_BOARD: ${{ inputs.board }}
          IN_SUITE: ${{ inputs.suite }}
          IN_FLAVOR: ${{ inputs.flavor }}
        run: |
          # build.yml is pinned to the stable suites; the suite input filters within these.
          SUITES=(jammy noble)
          FLAVORS=(desktop server)

          want() { [ "$1" = "all" ] || [ "$1" = "$2" ]; }

          build_entries=""
          declare -A seen_sf seen_s
          for file in config/boards/*.sh; do
              board="$(basename "${file%.sh}")"
              want "${IN_BOARD}" "${board}" || continue
              COMPATIBLE_SUITES=(); COMPATIBLE_FLAVORS=()
              # shellcheck disable=SC1090
              source "${file}"
              for suite in "${SUITES[@]}"; do
                  want "${IN_SUITE}" "${suite}" || continue
                  [[ " ${COMPATIBLE_SUITES[*]} " == *" ${suite} "* ]] || continue
                  for flavor in "${FLAVORS[@]}"; do
                      want "${IN_FLAVOR}" "${flavor}" || continue
                      [[ " ${COMPATIBLE_FLAVORS[*]} " == *" ${flavor} "* ]] || continue
                      build_entries+="{\"board\":\"${board}\",\"suite\":\"${suite}\",\"flavor\":\"${flavor}\"},"
                      seen_sf["${suite}|${flavor}"]=1
                      seen_s["${suite}"]=1
                  done
              done
          done

          if [ -z "${build_entries}" ]; then
              echo "::error::No board/suite/flavor combination matched (board=${IN_BOARD} suite=${IN_SUITE} flavor=${IN_FLAVOR})."
              exit 1
          fi

          # rootfs + kernel are board-agnostic: build only what the selected boards need.
          rootfs_entries=""
          for k in "${!seen_sf[@]}"; do
              rootfs_entries+="{\"suite\":\"${k%%|*}\",\"flavor\":\"${k##*|}\"},"
          done
          kernel_entries=""
          for s in "${!seen_s[@]}"; do
              kernel_entries+="{\"suite\":\"${s}\"},"
          done

          {
              echo "build_matrix={\"include\":[${build_entries%,}]}"
              echo "rootfs_matrix={\"include\":[${rootfs_entries%,}]}"
              echo "kernel_matrix={\"include\":[${kernel_entries%,}]}"
          } >> "$GITHUB_OUTPUT"

  rootfs:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build rootfs
    needs: [config]
    strategy:
        matrix: ${{ fromJson(needs.config.outputs.rootfs_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Build
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }} --rootfs-only

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
            name: ubuntu-${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}-preinstalled-${{ matrix.flavor }}-arm64-rootfs
            path: ./build/ubuntu-${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz
            if-no-files-found: error
            retention-days: 1

  kernel:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build kernel
    needs: [config]
    strategy:
        matrix: ${{ fromJson(needs.config.outputs.kernel_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Resolve kernel cache key
        id: kkey
        shell: bash
        run: |
          # Key the cache on the kernel source commit so a source update auto-invalidates it.
          # shellcheck disable=SC1090
          source config/suites/${{ matrix.suite }}.sh
          sha="$(git ls-remote "${KERNEL_REPO}" "refs/heads/${KERNEL_BRANCH}" | awk 'NR==1{print substr($1,1,12)}')"
          echo "key=cache/kernel/${{ matrix.suite }}/${sha:-unknown}" >> "$GITHUB_OUTPUT"
          echo "kernel cache key: cache/kernel/${{ matrix.suite }}/${sha:-unknown}"

      - name: Restore kernel cache (S3)
        id: kc
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "${{ steps.kkey.outputs.key }}" build
          if compgen -G "build/linux-image-*.deb" >/dev/null && compgen -G "build/linux-headers-*.deb" >/dev/null; then
            echo "hit=true" >> "$GITHUB_OUTPUT"; echo "kernel cache HIT — skipping compile"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"; echo "kernel cache MISS — compiling"
          fi

      - name: Compile kernel
        if: steps.kc.outputs.hit != 'true'
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --kernel-only

      - name: Save kernel cache (S3)
        if: steps.kc.outputs.hit != 'true'
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build "${{ steps.kkey.outputs.key }}" 'linux-*.deb'

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
            name: linux-rockchip-${{ matrix.suite == 'jammy' && '5.10' || matrix.suite == 'noble' && '6.1' }}
            path: ./build/linux-*.deb
            if-no-files-found: error
            retention-days: 1

  build:
    runs-on: [self-hosted, ARM64, RK1]
    needs: [config, rootfs, kernel]
    name: Build image
    strategy:
      matrix: ${{ fromJson(needs.config.outputs.build_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Checkout rootfs
        uses: actions/download-artifact@v4.1.2
        with:
            name: ubuntu-${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}-preinstalled-${{ matrix.flavor }}-arm64-rootfs
            path: ./build/

      - name: Checkout kernel
        uses: actions/download-artifact@v4.1.2
        with:
            name: linux-rockchip-${{ matrix.suite == 'jammy' && '5.10' || matrix.suite == 'noble' && '6.1' }}
            path: ./build/

      - name: Build
        shell: bash
        run: sudo ./build.sh --board=${{ matrix.board }} --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }}

      - name: Publish image to S3
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ver=${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}
          ./scripts/ci-s3.sh put images "images/${ver}/${{ matrix.board }}" "ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64-${{ matrix.board }}.*"

      - name: Clean cache
        shell: bash
        run: sync && sudo rm -rf ./images/ ./build/ && sync
