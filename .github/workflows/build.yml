name: Build

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board to build (a single board name, or 'all')"
        default: all
        type: string
      suite:
        description: "Ubuntu suite"
        default: all
        type: choice
        options:
          - all
          - jammy
          - noble
      flavor:
        description: "Flavor"
        default: all
        type: choice
        options:
          - all
          - server
          - desktop

run-name: Build

jobs:
  config:
    runs-on: ubuntu-latest
    name: Create matrix
    outputs:
      build_matrix: ${{ steps.gen.outputs.build_matrix }}
      rootfs_matrix: ${{ steps.gen.outputs.rootfs_matrix }}
      kernel_matrix: ${{ steps.gen.outputs.kernel_matrix }}
      uboot_matrix: ${{ steps.gen.outputs.uboot_matrix }}
      base_matrix: ${{ steps.gen.outputs.base_matrix }}
    steps:
      - name: Reset workspace
        shell: bash
        run: |
          # Detach any chroot mounts a cancelled build left behind (esp. the kernel-global
          # devtmpfs at build/rootfs/dev) BEFORE deleting. --one-file-system is the hard guard:
          # rm stops at any mount boundary, so even if the unmount below misses (e.g. $(pwd)
          # symlink divergence) rm can never recurse into the live devtmpfs and unlink host /dev/null.
          for m in $(mount | awk '{print $3}' | grep "$(pwd)/build" | sort -r); do
            sudo umount -lf "$m" 2>/dev/null || true
          done
          sudo rm -rf --one-file-system ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Generate matrices
        id: gen
        env:
          IN_BOARD: ${{ inputs.board }}
          IN_SUITE: ${{ inputs.suite }}
          IN_FLAVOR: ${{ inputs.flavor }}
        run: |
          # build.yml produces LTS images (jammy 22.04 + noble 24.04); the suite input filters within this.
          SUITES=(jammy noble)
          FLAVORS=(desktop server)

          want() { [ "$1" = "all" ] || [ "$1" = "$2" ]; }

          # resolve_base_group: maps a board's BOARD_SOC to its configured-base group (if any).
          source scripts/lib/base.sh

          build_entries=""
          declare -A seen_sf seen_s seen_ub seen_base
          for file in config/boards/*.sh; do
              board="$(basename "${file%.sh}")"
              want "${IN_BOARD}" "${board}" || continue
              COMPATIBLE_SUITES=(); COMPATIBLE_FLAVORS=()
              UBOOT_PACKAGE=""; UBOOT_RULES_TARGET=""; BOARD_SOC=""
              # shellcheck disable=SC1090
              source "${file}"
              base_group="$(resolve_base_group "${BOARD_SOC}")"
              board_matched=0
              for suite in "${SUITES[@]}"; do
                  want "${IN_SUITE}" "${suite}" || continue
                  [[ " ${COMPATIBLE_SUITES[*]} " == *" ${suite} "* ]] || continue
                  for flavor in "${FLAVORS[@]}"; do
                      want "${IN_FLAVOR}" "${flavor}" || continue
                      [[ " ${COMPATIBLE_FLAVORS[*]} " == *" ${flavor} "* ]] || continue
                      build_entries+="{\"board\":\"${board}\",\"suite\":\"${suite}\",\"flavor\":\"${flavor}\"},"
                      seen_sf["${suite}|${flavor}"]=1
                      seen_s["${suite}"]=1
                      if [[ -n "${base_group}" && -z "${seen_base[${suite}|${flavor}|${base_group}]+x}" ]]; then
                          seen_base["${suite}|${flavor}|${base_group}"]="${board}"
                      fi
                      board_matched=1
                  done
              done
              if [[ "${board_matched}" == "1" && -n "${UBOOT_PACKAGE}" && -n "${UBOOT_RULES_TARGET}" \
                    && -z "${seen_ub[${UBOOT_PACKAGE}|${UBOOT_RULES_TARGET}]+x}" ]]; then
                  seen_ub["${UBOOT_PACKAGE}|${UBOOT_RULES_TARGET}"]="${board}"
              fi
          done

          if [ -z "${build_entries}" ]; then
              echo "::error::No board/suite/flavor combination matched (board=${IN_BOARD} suite=${IN_SUITE} flavor=${IN_FLAVOR})."
              exit 1
          fi

          # rootfs + kernel are board-agnostic: build only what the selected boards need.
          rootfs_entries=""
          for k in "${!seen_sf[@]}"; do
              rootfs_entries+="{\"suite\":\"${k%%|*}\",\"flavor\":\"${k##*|}\"},"
          done
          kernel_entries=""
          for s in "${!seen_s[@]}"; do
              kernel_entries+="{\"suite\":\"${s}\"},"
          done
          # u-boot is per (package, target) pair: one build covers all boards sharing that pair.
          uboot_entries=""
          for k in "${!seen_ub[@]}"; do
              pkg="${k%%|*}"; target="${k##*|}"; rep_board="${seen_ub[$k]}"
              uboot_entries+="{\"uboot_package\":\"${pkg}\",\"uboot_target\":\"${target}\",\"board\":\"${rep_board}\"},"
          done
          # configured base is per (suite, flavor, group): one build covers all boards in that group.
          base_entries=""
          for k in "${!seen_base[@]}"; do
              b_suite="${k%%|*}"; b_rest="${k#*|}"; b_flavor="${b_rest%%|*}"; b_group="${b_rest##*|}"; b_rep="${seen_base[$k]}"
              base_entries+="{\"suite\":\"${b_suite}\",\"flavor\":\"${b_flavor}\",\"group\":\"${b_group}\",\"board\":\"${b_rep}\"},"
          done

          {
              echo "build_matrix={\"include\":[${build_entries%,}]}"
              echo "rootfs_matrix={\"include\":[${rootfs_entries%,}]}"
              echo "kernel_matrix={\"include\":[${kernel_entries%,}]}"
              echo "uboot_matrix={\"include\":[${uboot_entries%,}]}"
              echo "base_matrix={\"include\":[${base_entries%,}]}"
          } >> "$GITHUB_OUTPUT"

  kernel:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build kernel
    needs: [config]
    strategy:
        matrix: ${{ fromJson(needs.config.outputs.kernel_matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: |
          # Detach any chroot mounts a cancelled build left behind (esp. the kernel-global
          # devtmpfs at build/rootfs/dev) BEFORE deleting. --one-file-system is the hard guard:
          # rm stops at any mount boundary, so even if the unmount below misses (e.g. $(pwd)
          # symlink divergence) rm can never recurse into the live devtmpfs and unlink host /dev/null.
          for m in $(mount | awk '{print $3}' | grep "$(pwd)/build" | sort -r); do
            sudo umount -lf "$m" 2>/dev/null || true
          done
          sudo rm -rf --one-file-system ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: |
          source scripts/lib/retry.sh
          git_lfs_retry

      - name: Resolve kernel cache key
        id: kkey
        shell: bash
        run: |
          # Key the cache on the kernel source commit so a source update auto-invalidates it.
          # shellcheck disable=SC1090
          source config/suites/${{ matrix.suite }}.sh
          source scripts/lib/retry.sh
          sha=$(git_ls_remote_sha "${KERNEL_REPO}" "refs/heads/${KERNEL_BRANCH}")
          echo "key=cache/kernel/${{ matrix.suite }}/${sha:-unknown}" >> "$GITHUB_OUTPUT"
          echo "kernel cache key: cache/kernel/${{ matrix.suite }}/${sha:-unknown}"

      - name: Restore kernel cache (S3)
        id: kc
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "${{ steps.kkey.outputs.key }}" build
          if compgen -G "build/linux-image-*.deb" >/dev/null && compgen -G "build/linux-headers-*.deb" >/dev/null; then
            echo "hit=true" >> "$GITHUB_OUTPUT"; echo "kernel cache HIT — skipping compile"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"; echo "kernel cache MISS — compiling"
          fi

      - name: Compile kernel
        if: steps.kc.outputs.hit != 'true'
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --kernel-only

      - name: Save kernel cache (S3)
        if: steps.kc.outputs.hit != 'true'
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build "${{ steps.kkey.outputs.key }}" 'linux-*.deb'

      - name: Publish kernel to S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build "ci/${{ github.run_id }}/kernel/${{ matrix.suite }}" 'linux-*.deb'

  uboot:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build u-boot
    needs: [config]
    strategy:
      matrix: ${{ fromJson(needs.config.outputs.uboot_matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: |
          # Detach any chroot mounts a cancelled build left behind (esp. the kernel-global
          # devtmpfs at build/rootfs/dev) BEFORE deleting. --one-file-system is the hard guard:
          # rm stops at any mount boundary, so even if the unmount below misses (e.g. $(pwd)
          # symlink divergence) rm can never recurse into the live devtmpfs and unlink host /dev/null.
          for m in $(mount | awk '{print $3}' | grep "$(pwd)/build" | sort -r); do
            sudo umount -lf "$m" 2>/dev/null || true
          done
          sudo rm -rf --one-file-system ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: |
          source scripts/lib/retry.sh
          git_lfs_retry

      - name: Resolve u-boot cache key
        id: ubkey
        shell: bash
        run: |
          # Key on content hash of u-boot package inputs: upstream pin, patches, rules, rkbin blobs.
          sha=$(find packages/${{ matrix.uboot_package }}/debian -type f | sort | xargs sha256sum | sha256sum | cut -c1-12)
          echo "key=cache/uboot/${{ matrix.uboot_package }}/${{ matrix.uboot_target }}/${sha}" >> "$GITHUB_OUTPUT"
          echo "u-boot cache key: cache/uboot/${{ matrix.uboot_package }}/${{ matrix.uboot_target }}/${sha}"

      - name: Restore u-boot cache (S3)
        id: ubc
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "${{ steps.ubkey.outputs.key }}" build
          if compgen -G "build/u-boot-*.deb" >/dev/null; then
            echo "hit=true" >> "$GITHUB_OUTPUT"; echo "u-boot cache HIT — skipping compile"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"; echo "u-boot cache MISS — compiling"
          fi

      - name: Compile u-boot
        if: steps.ubc.outputs.hit != 'true'
        shell: bash
        run: sudo ./build.sh --board=${{ matrix.board }} --uboot-only

      - name: Save u-boot cache (S3)
        if: steps.ubc.outputs.hit != 'true'
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build "${{ steps.ubkey.outputs.key }}" 'u-boot-*.deb'

      - name: Publish u-boot to S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build "ci/${{ github.run_id }}/uboot/${{ matrix.uboot_package }}/${{ matrix.uboot_target }}" 'u-boot-*.deb'

  base:
    runs-on: [self-hosted, ARM64, RK1]
    needs: [config, kernel]
    name: Build base
    strategy:
      matrix: ${{ fromJson(needs.config.outputs.base_matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: |
          # Detach any chroot mounts a cancelled build left behind (esp. the kernel-global
          # devtmpfs at build/rootfs-base/dev) BEFORE deleting. --one-file-system is the hard
          # guard: rm stops at any mount boundary, so it can never recurse into the live
          # devtmpfs and unlink host /dev/null.
          for m in $(mount | awk '{print $3}' | grep "$(pwd)/build" | sort -r); do
            sudo umount -lf "$m" 2>/dev/null || true
          done
          sudo rm -rf --one-file-system ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: |
          source scripts/lib/retry.sh
          git_lfs_retry

      - name: Resolve rootfs cache key
        id: rfkey
        run: |
          source scripts/lib/retry.sh
          livecd_sha=$(git_ls_remote_sha "https://github.com/Joshua-Riek/livecd-rootfs" "HEAD")
          content_sha=$(cat config/suites/${{ matrix.suite }}.sh config/flavors/${{ matrix.flavor }}.sh scripts/build-rootfs.sh | sha256sum | cut -c1-12)
          month=$(date -u +%Y%m)
          echo "key=cache/rootfs/${{ matrix.suite }}/${{ matrix.flavor }}/${month}/${livecd_sha:-unknown}-${content_sha}" >> "$GITHUB_OUTPUT"

      - name: Fetch rootfs (cache → latest.tar.xz fallback)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ver=${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}
          ./scripts/ci-s3.sh get "${{ steps.rfkey.outputs.key }}" build
          if compgen -G "build/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz" >/dev/null; then
            echo "rootfs cache HIT"
          else
            echo "rootfs cache MISS — fetching latest.tar.xz"
            ./scripts/ci-s3.sh get "rootfs/${{ matrix.suite }}/${{ matrix.flavor }}/latest.tar.xz" build
            [ -f build/latest.tar.xz ] || { echo "ERROR: rootfs not in cache or at rootfs/${{ matrix.suite }}/${{ matrix.flavor }}/latest.tar.xz — run the RootFS pipeline first"; exit 1; }
            month=$(date -u +%Y%m)
            mv build/latest.tar.xz "build/ubuntu-${ver}-${month}-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz"
          fi

      - name: Fetch kernel from S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "ci/${{ github.run_id }}/kernel/${{ matrix.suite }}" build
          compgen -G "build/linux-image-*.deb" >/dev/null || { echo "ERROR: kernel handoff missing from S3"; exit 1; }

      - name: Resolve base cache key
        id: bkey
        shell: bash
        run: |
          # Key on everything the base is built from: kernel source commit, livecd-rootfs
          # commit, the monthly rootfs snapshot, and the base recipe scripts/config.
          # shellcheck disable=SC1090
          source config/suites/${{ matrix.suite }}.sh
          source scripts/lib/retry.sh
          kernel_sha=$(git_ls_remote_sha "${KERNEL_REPO}" "refs/heads/${KERNEL_BRANCH}")
          livecd_sha=$(git_ls_remote_sha "https://github.com/Joshua-Riek/livecd-rootfs" "HEAD")
          recipe_sha=$(cat config/bases/${{ matrix.group }}.sh scripts/build-base.sh scripts/lib/chroot.sh config/suites/${{ matrix.suite }}.sh config/flavors/${{ matrix.flavor }}.sh scripts/build-rootfs.sh | sha256sum | cut -c1-12)
          month=$(date -u +%Y%m)
          echo "key=cache/base/${{ matrix.group }}/${{ matrix.suite }}/${{ matrix.flavor }}/${month}/${kernel_sha:-x}-${livecd_sha:-x}-${recipe_sha}" >> "$GITHUB_OUTPUT"
          echo "base cache key: cache/base/${{ matrix.group }}/${{ matrix.suite }}/${{ matrix.flavor }}/${month}/${kernel_sha:-x}-${livecd_sha:-x}-${recipe_sha}"

      - name: Restore base cache (S3)
        id: bc
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "${{ steps.bkey.outputs.key }}" build/base
          if compgen -G "build/base/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.base.tar.xz" >/dev/null; then
            echo "hit=true" >> "$GITHUB_OUTPUT"; echo "base cache HIT — skipping build"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"; echo "base cache MISS — building"
          fi

      - name: Build base
        if: steps.bc.outputs.hit != 'true'
        shell: bash
        run: |
          source scripts/lib/retry.sh
          APT_PROXY="${{ vars.APT_PROXY }}"
          with_apt_proxy ./build.sh --base-only --board=${{ matrix.board }} --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }}

      - name: Save base cache (S3)
        if: steps.bc.outputs.hit != 'true'
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build/base "${{ steps.bkey.outputs.key }}" 'ubuntu-*.base.tar.xz'

      - name: Publish base to S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build/base "ci/${{ github.run_id }}/base/${{ matrix.group }}/${{ matrix.suite }}-${{ matrix.flavor }}" 'ubuntu-*.base.tar.xz'

  build:
    runs-on: [self-hosted, ARM64, RK1]
    needs: [config, kernel, uboot, base]
    # Run even when `base` is skipped (its matrix is empty for a non-RK3588-only build);
    # a skipped dependency is not a failure. Still skips if any dependency actually failed.
    if: ${{ !failure() && !cancelled() }}
    name: Build image
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.config.outputs.build_matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: |
          # Detach any chroot mounts a cancelled build left behind (esp. the kernel-global
          # devtmpfs at build/rootfs/dev) BEFORE deleting. --one-file-system is the hard guard:
          # rm stops at any mount boundary, so even if the unmount below misses (e.g. $(pwd)
          # symlink divergence) rm can never recurse into the live devtmpfs and unlink host /dev/null.
          for m in $(mount | awk '{print $3}' | grep "$(pwd)/build" | sort -r); do
            sudo umount -lf "$m" 2>/dev/null || true
          done
          sudo rm -rf --one-file-system ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: |
          source scripts/lib/retry.sh
          git_lfs_retry

      - name: Resolve rootfs cache key
        id: rfkey
        run: |
          source scripts/lib/retry.sh
          livecd_sha=$(git_ls_remote_sha "https://github.com/Joshua-Riek/livecd-rootfs" "HEAD")
          content_sha=$(cat config/suites/${{ matrix.suite }}.sh config/flavors/${{ matrix.flavor }}.sh scripts/build-rootfs.sh | sha256sum | cut -c1-12)
          month=$(date -u +%Y%m)
          echo "key=cache/rootfs/${{ matrix.suite }}/${{ matrix.flavor }}/${month}/${livecd_sha:-unknown}-${content_sha}" >> "$GITHUB_OUTPUT"
          echo "rootfs cache key: cache/rootfs/${{ matrix.suite }}/${{ matrix.flavor }}/${month}/${livecd_sha:-unknown}-${content_sha}"

      - name: Fetch rootfs (cache → latest.tar.xz fallback)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ver=${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}
          ./scripts/ci-s3.sh get "${{ steps.rfkey.outputs.key }}" build
          if compgen -G "build/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz" >/dev/null; then
            echo "rootfs cache HIT"
          else
            echo "rootfs cache MISS — fetching latest.tar.xz"
            ./scripts/ci-s3.sh get "rootfs/${{ matrix.suite }}/${{ matrix.flavor }}/latest.tar.xz" build
            [ -f build/latest.tar.xz ] || { echo "ERROR: rootfs not in cache or at rootfs/${{ matrix.suite }}/${{ matrix.flavor }}/latest.tar.xz — run the RootFS pipeline first"; exit 1; }
            month=$(date -u +%Y%m)
            mv build/latest.tar.xz "build/ubuntu-${ver}-${month}-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz"
          fi

      - name: Fetch kernel from S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "ci/${{ github.run_id }}/kernel/${{ matrix.suite }}" build
          compgen -G "build/linux-image-*.deb" >/dev/null || { echo "ERROR: kernel handoff missing from S3"; exit 1; }

      - name: Fetch u-boot from S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          # shellcheck disable=SC1090
          source config/boards/${{ matrix.board }}.sh
          ./scripts/ci-s3.sh get "ci/${{ github.run_id }}/uboot/${UBOOT_PACKAGE}/${UBOOT_RULES_TARGET}" build
          compgen -G "build/u-boot-*.deb" >/dev/null || { echo "ERROR: u-boot handoff missing from S3"; exit 1; }

      - name: Fetch configured base from S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          source scripts/lib/base.sh
          # shellcheck disable=SC1090
          source config/boards/${{ matrix.board }}.sh
          group="$(resolve_base_group "${BOARD_SOC}")"
          if [ -n "${group}" ]; then
            ./scripts/ci-s3.sh get "ci/${{ github.run_id }}/base/${group}/${{ matrix.suite }}-${{ matrix.flavor }}" build/base
            compgen -G "build/base/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.base.tar.xz" >/dev/null || { echo "ERROR: base handoff missing for group ${group}"; exit 1; }
            echo "using configured base (group ${group})"
          else
            echo "no base group for ${{ matrix.board }} (SoC ${BOARD_SOC}); building from rootfs"
          fi

      - name: Build
        shell: bash
        run: |
          source scripts/lib/retry.sh
          APT_PROXY="${{ vars.APT_PROXY }}"
          with_apt_proxy ./build.sh --board=${{ matrix.board }} --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }}

      - name: Publish image to S3 (dev /build channel)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ver=${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}
          ./scripts/ci-s3.sh put images "build/${ver}/${{ matrix.board }}" "ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64-${{ matrix.board }}.*"

      - name: Clean cache
        shell: bash
        run: |
          sync
          # Detach leftover chroot mounts before deleting; --one-file-system stops rm at every
          # mount boundary so it can never recurse into a live devtmpfs and unlink host /dev/null.
          for m in $(mount | awk '{print $3}' | grep "$(pwd)/build" | sort -r); do
            sudo umount -lf "$m" 2>/dev/null || true
          done
          sudo rm -rf --one-file-system ./images/ ./build/
          sync
