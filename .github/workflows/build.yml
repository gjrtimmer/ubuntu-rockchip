name: Build

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board to build (a single board name, or 'all')"
        default: all
        type: string
      suite:
        description: "Ubuntu suite"
        default: all
        type: choice
        options:
          - all
          - jammy
          - noble
      flavor:
        description: "Flavor"
        default: all
        type: choice
        options:
          - all
          - server
          - desktop

run-name: Build

jobs:
  config:
    runs-on: ubuntu-latest
    name: Create matrix
    outputs:
      build_matrix: ${{ steps.gen.outputs.build_matrix }}
      rootfs_matrix: ${{ steps.gen.outputs.rootfs_matrix }}
      kernel_matrix: ${{ steps.gen.outputs.kernel_matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate matrices
        id: gen
        env:
          IN_BOARD: ${{ inputs.board }}
          IN_SUITE: ${{ inputs.suite }}
          IN_FLAVOR: ${{ inputs.flavor }}
        run: |
          # build.yml is pinned to the stable suites; the suite input filters within these.
          SUITES=(jammy noble)
          FLAVORS=(desktop server)

          want() { [ "$1" = "all" ] || [ "$1" = "$2" ]; }

          build_entries=""
          declare -A seen_sf seen_s
          for file in config/boards/*.sh; do
              board="$(basename "${file%.sh}")"
              want "${IN_BOARD}" "${board}" || continue
              COMPATIBLE_SUITES=(); COMPATIBLE_FLAVORS=()
              # shellcheck disable=SC1090
              source "${file}"
              for suite in "${SUITES[@]}"; do
                  want "${IN_SUITE}" "${suite}" || continue
                  [[ " ${COMPATIBLE_SUITES[*]} " == *" ${suite} "* ]] || continue
                  for flavor in "${FLAVORS[@]}"; do
                      want "${IN_FLAVOR}" "${flavor}" || continue
                      [[ " ${COMPATIBLE_FLAVORS[*]} " == *" ${flavor} "* ]] || continue
                      build_entries+="{\"board\":\"${board}\",\"suite\":\"${suite}\",\"flavor\":\"${flavor}\"},"
                      seen_sf["${suite}|${flavor}"]=1
                      seen_s["${suite}"]=1
                  done
              done
          done

          if [ -z "${build_entries}" ]; then
              echo "::error::No board/suite/flavor combination matched (board=${IN_BOARD} suite=${IN_SUITE} flavor=${IN_FLAVOR})."
              exit 1
          fi

          # rootfs + kernel are board-agnostic: build only what the selected boards need.
          rootfs_entries=""
          for k in "${!seen_sf[@]}"; do
              rootfs_entries+="{\"suite\":\"${k%%|*}\",\"flavor\":\"${k##*|}\"},"
          done
          kernel_entries=""
          for s in "${!seen_s[@]}"; do
              kernel_entries+="{\"suite\":\"${s}\"},"
          done

          {
              echo "build_matrix={\"include\":[${build_entries%,}]}"
              echo "rootfs_matrix={\"include\":[${rootfs_entries%,}]}"
              echo "kernel_matrix={\"include\":[${kernel_entries%,}]}"
          } >> "$GITHUB_OUTPUT"

  rootfs:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build rootfs
    needs: [config]
    strategy:
        matrix: ${{ fromJson(needs.config.outputs.rootfs_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Build
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }} --rootfs-only

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
            name: ubuntu-${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}-preinstalled-${{ matrix.flavor }}-arm64-rootfs
            path: ./build/ubuntu-${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz
            if-no-files-found: error

  kernel:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build kernel
    needs: [config]
    strategy:
        matrix: ${{ fromJson(needs.config.outputs.kernel_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Build
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --kernel-only

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
            name: linux-rockchip-${{ matrix.suite == 'jammy' && '5.10' || matrix.suite == 'noble' && '6.1' }}
            path: ./build/linux-*.deb
            if-no-files-found: error

  build:
    runs-on: [self-hosted, ARM64, RK1]
    needs: [config, rootfs, kernel]
    name: Build image
    strategy:
      matrix: ${{ fromJson(needs.config.outputs.build_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Checkout rootfs
        uses: actions/download-artifact@v4.1.2
        with:
            name: ubuntu-${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}-preinstalled-${{ matrix.flavor }}-arm64-rootfs
            path: ./build/

      - name: Checkout kernel
        uses: actions/download-artifact@v4.1.2
        with:
            name: linux-rockchip-${{ matrix.suite == 'jammy' && '5.10' || matrix.suite == 'noble' && '6.1' }}
            path: ./build/

      - name: Build
        shell: bash
        run: sudo ./build.sh --board=${{ matrix.board }} --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }}

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ubuntu-${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}-preinstalled-${{ matrix.flavor }}-arm64-${{ matrix.board }}
          path: ./images/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64-${{ matrix.board }}.*
          if-no-files-found: error

      - name: Clean cache
        shell: bash
        run: sync && sudo rm -rf ./images/ ./build/ && sync
