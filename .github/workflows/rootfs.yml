name: RootFS
run-name: RootFS

# Builds the board-agnostic rootfs once per suite/flavor and publishes it to S3 for
# every other pipeline to consume — instead of each pipeline rebuilding its own.
# Overwrite-free: each build is written to an immutable dated path, then a tiny
# `current` pointer is flipped last, so a pipeline mid-fetch never reads a half-written
# object and we never clobber a file that another job is downloading.
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to build ('all', or e.g. noble)"
        default: all
        type: string
      flavor:
        description: "Flavor ('all', server, desktop)"
        default: all
        type: string

permissions:
  contents: read

concurrency:
  group: rootfs
  cancel-in-progress: false

jobs:
  config:
    runs-on: ubuntu-latest
    name: Create matrix
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Reset workspace
        shell: bash
        run: sudo rm -rf ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Generate matrix
        id: gen
        env:
          IN_SUITE: ${{ inputs.suite }}
          IN_FLAVOR: ${{ inputs.flavor }}
        run: |
          # All suites x flavors by default (the rootfs is board-agnostic, so it serves
          # every board and pipeline). workflow_dispatch can narrow to one suite/flavor
          # (e.g. to re-publish a single leg after a transient upload failure).
          # Empty input (cron) or 'all' => no filtering.
          want() { [ -z "$1" ] || [ "$1" = "all" ] || [ "$1" = "$2" ]; }
          entries=""
          for s in config/suites/*.sh; do
              suite="$(basename "${s%.sh}")"
              want "${IN_SUITE}" "${suite}" || continue
              for f in config/flavors/*.sh; do
                  flavor="$(basename "${f%.sh}")"
                  want "${IN_FLAVOR}" "${flavor}" || continue
                  entries+="{\"suite\":\"${suite}\",\"flavor\":\"${flavor}\"},"
              done
          done
          [ -n "${entries}" ] || { echo "::error::no suite/flavor matched (suite=${IN_SUITE} flavor=${IN_FLAVOR})"; exit 1; }
          echo "matrix={\"include\":[${entries%,}]}" >> "$GITHUB_OUTPUT"

  rootfs:
    runs-on: [self-hosted, ARM64, RK1]
    needs: [config]
    name: Build rootfs
    strategy:
        fail-fast: false
        matrix: ${{ fromJson(needs.config.outputs.matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: sudo rm -rf ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Build
        shell: bash
        run: sudo http_proxy="${{ vars.APT_PROXY }}" https_proxy="${{ vars.APT_PROXY }}" no_proxy="localhost,127.0.0.1,::1,github.com,.github.com,.githubusercontent.com,codeload.github.com" ./build.sh --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }} --rootfs-only

      - name: Publish rootfs to S3 (dated + pointer)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          d=$(date -u +%Y%m%d)
          base="rootfs/${{ matrix.suite }}/${{ matrix.flavor }}"
          src=$(ls build/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz 2>/dev/null | head -n1 || true)
          # Sanity guard: build.sh can exit 0 even when the rootfs build failed (e.g. an EOL
          # suite whose archive vanished), leaving no tar or a tiny stub. Never publish that.
          if [ -z "${src}" ]; then echo "::error::no rootfs tar produced — build failed; not publishing"; exit 1; fi
          sz=$(stat -c%s "${src}")
          if [ "${sz}" -lt $((50*1024*1024)) ]; then echo "::error::rootfs ${src} is only ${sz} bytes (<50MB) — stub, not publishing"; exit 1; fi
          echo "rootfs OK: $((sz/1024/1024)) MiB — ${src}"
          fn=$(basename "$src")
          # 1. write-once dated copy (retention + reproducibility)
          ./scripts/ci-s3.sh put build "${base}/${d}" "ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz"
          # 2. publish latest.tar.xz via a server-side copy from the dated object — atomic
          #    replace, so a pipeline fetching latest.tar.xz never sees a partial file and we
          #    never overwrite the object that is currently being uploaded.
          ./scripts/ci-s3.sh cp "${base}/${d}/${fn}" "${base}/latest.tar.xz"
          echo "published ${base}/${d}/${fn} -> ${base}/latest.tar.xz"
