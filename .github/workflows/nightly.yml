name: Nightly Build
run-name: Nightly build

# NOTE: this workflow is disabled in the Actions UI (gh workflow disable "Nightly Build").
# The cron below stays in the file so re-enabling is a one-click UI action; editing this
# file does not re-enable it. It mirrors build.yml (self-hosted, S3 handoffs, dev /build
# channel) but builds the full board sweep on a schedule instead of from dispatch inputs.
on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  config:
    runs-on: ubuntu-latest
    name: Create matrix
    outputs:
      build_matrix: ${{ steps.gen.outputs.build_matrix }}
      rootfs_matrix: ${{ steps.gen.outputs.rootfs_matrix }}
      kernel_matrix: ${{ steps.gen.outputs.kernel_matrix }}
    steps:
      - name: Reset workspace
        shell: bash
        run: sudo rm -rf ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Generate matrices
        id: gen
        run: |
          # Nightly builds the full board sweep for noble (24.04) — no input filtering.
          SUITES=(noble)
          FLAVORS=(desktop server)

          build_entries=""
          declare -A seen_sf seen_s
          for file in config/boards/*.sh; do
              board="$(basename "${file%.sh}")"
              COMPATIBLE_SUITES=(); COMPATIBLE_FLAVORS=()
              # shellcheck disable=SC1090
              source "${file}"
              for suite in "${SUITES[@]}"; do
                  [[ " ${COMPATIBLE_SUITES[*]} " == *" ${suite} "* ]] || continue
                  for flavor in "${FLAVORS[@]}"; do
                      [[ " ${COMPATIBLE_FLAVORS[*]} " == *" ${flavor} "* ]] || continue
                      build_entries+="{\"board\":\"${board}\",\"suite\":\"${suite}\",\"flavor\":\"${flavor}\"},"
                      seen_sf["${suite}|${flavor}"]=1
                      seen_s["${suite}"]=1
                  done
              done
          done

          if [ -z "${build_entries}" ]; then
              echo "::error::No board/suite/flavor combination matched."
              exit 1
          fi

          # rootfs + kernel are board-agnostic: build only what the boards need.
          rootfs_entries=""
          for k in "${!seen_sf[@]}"; do
              rootfs_entries+="{\"suite\":\"${k%%|*}\",\"flavor\":\"${k##*|}\"},"
          done
          kernel_entries=""
          for s in "${!seen_s[@]}"; do
              kernel_entries+="{\"suite\":\"${s}\"},"
          done

          {
              echo "build_matrix={\"include\":[${build_entries%,}]}"
              echo "rootfs_matrix={\"include\":[${rootfs_entries%,}]}"
              echo "kernel_matrix={\"include\":[${kernel_entries%,}]}"
          } >> "$GITHUB_OUTPUT"

  rootfs:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build rootfs
    needs: [config]
    strategy:
        matrix: ${{ fromJson(needs.config.outputs.rootfs_matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: sudo rm -rf ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Build
        shell: bash
        run: sudo http_proxy="${{ vars.APT_PROXY }}" https_proxy="${{ vars.APT_PROXY }}" no_proxy="localhost,127.0.0.1,::1,github.com,.github.com,.githubusercontent.com,codeload.github.com" ./build.sh --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }} --rootfs-only

      - name: Publish rootfs to S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ver=${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}
          ./scripts/ci-s3.sh put build "ci/${{ github.run_id }}/rootfs/${ver}-${{ matrix.flavor }}" "ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz"

  kernel:
    runs-on: [self-hosted, ARM64, RK1]
    name: Build kernel
    needs: [config]
    strategy:
        matrix: ${{ fromJson(needs.config.outputs.kernel_matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: sudo rm -rf ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Resolve kernel cache key
        id: kkey
        shell: bash
        run: |
          # Key the cache on the kernel source commit so a source update auto-invalidates it.
          # shellcheck disable=SC1090
          source config/suites/${{ matrix.suite }}.sh
          sha="$(git ls-remote "${KERNEL_REPO}" "refs/heads/${KERNEL_BRANCH}" | awk 'NR==1{print substr($1,1,12)}')"
          echo "key=cache/kernel/${{ matrix.suite }}/${sha:-unknown}" >> "$GITHUB_OUTPUT"
          echo "kernel cache key: cache/kernel/${{ matrix.suite }}/${sha:-unknown}"

      - name: Restore kernel cache (S3)
        id: kc
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "${{ steps.kkey.outputs.key }}" build
          if compgen -G "build/linux-image-*.deb" >/dev/null && compgen -G "build/linux-headers-*.deb" >/dev/null; then
            echo "hit=true" >> "$GITHUB_OUTPUT"; echo "kernel cache HIT — skipping compile"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"; echo "kernel cache MISS — compiling"
          fi

      - name: Compile kernel
        if: steps.kc.outputs.hit != 'true'
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --kernel-only

      - name: Save kernel cache (S3)
        if: steps.kc.outputs.hit != 'true'
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build "${{ steps.kkey.outputs.key }}" 'linux-*.deb'

      - name: Publish kernel to S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: ./scripts/ci-s3.sh put build "ci/${{ github.run_id }}/kernel/${{ matrix.suite }}" 'linux-*.deb'

  build:
    runs-on: [self-hosted, ARM64, RK1]
    needs: [config, rootfs, kernel]
    name: Build image
    strategy:
      matrix: ${{ fromJson(needs.config.outputs.build_matrix) }}
    steps:
      - name: Reset workspace
        shell: bash
        run: sudo rm -rf ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Fetch rootfs from S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ver=${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}
          ./scripts/ci-s3.sh get "ci/${{ github.run_id }}/rootfs/${ver}-${{ matrix.flavor }}" build
          compgen -G "build/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz" >/dev/null || { echo "ERROR: rootfs handoff missing from S3"; exit 1; }

      - name: Fetch kernel from S3 (CI handoff)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ./scripts/ci-s3.sh get "ci/${{ github.run_id }}/kernel/${{ matrix.suite }}" build
          compgen -G "build/linux-image-*.deb" >/dev/null || { echo "ERROR: kernel handoff missing from S3"; exit 1; }

      - name: Build
        shell: bash
        run: sudo http_proxy="${{ vars.APT_PROXY }}" https_proxy="${{ vars.APT_PROXY }}" no_proxy="localhost,127.0.0.1,::1,github.com,.github.com,.githubusercontent.com,codeload.github.com" ./build.sh --board=${{ matrix.board }} --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }}

      - name: Publish image to S3 (dev /build channel)
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ver=${{ matrix.suite == 'jammy' && '22.04' || matrix.suite == 'noble' && '24.04' }}
          ./scripts/ci-s3.sh put images "build/${ver}/${{ matrix.board }}" "ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64-${{ matrix.board }}.*"

      - name: Clean cache
        shell: bash
        run: sync && sudo rm -rf ./images/ ./build/ && sync
