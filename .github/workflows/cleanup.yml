name: Cleanup
run-name: Prune S3 CI handoffs, dated rootfs and dev build images

# Dedicated scheduled cleanup of the S3 transient prefixes (ci/<run_id>/ handoffs,
# rootfs/ dated copies, build/ dev disk images), instead of bolting a cleanup job onto
# every build pipeline. Runs daily so the prefixes self-clean even during quiet periods.
# Retention: ci 90d, rootfs 90d (3 months), build 60d (2 months); cache/ and release
# images/ are never pruned.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      max_age:
        description: "Delete ci/ handoff objects older than this (rclone duration, e.g. 90d)"
        default: "90d"
        type: string

jobs:
  prune:
    runs-on: [self-hosted, ARM64, RK1]
    name: Prune ci/ handoffs
    steps:
      - name: Reset workspace
        shell: bash
        run: |
          # Detach any chroot mounts a cancelled build left behind (esp. the kernel-global
          # devtmpfs at build/rootfs/dev) BEFORE deleting. --one-file-system is the hard guard:
          # rm stops at any mount boundary, so even if the unmount below misses (e.g. $(pwd)
          # symlink divergence) rm can never recurse into the live devtmpfs and unlink host /dev/null.
          for m in $(mount | awk '{print $3}' | grep "$(pwd)/build" | sort -r); do
            sudo umount -lf "$m" 2>/dev/null || true
          done
          sudo rm -rf --one-file-system ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Prune ci/ handoffs, dated rootfs and dev build images
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          age="${{ inputs.max_age || '90d' }}"
          ./scripts/ci-s3.sh prune ci "${age}"
          # dated rootfs copies kept 3 months; latest.tar.xz is rewritten monthly so it stays fresh
          ./scripts/ci-s3.sh prune rootfs 90d
          # dev /build channel disk images (build/<ver>/<board>/<image>) kept 2 months;
          # release images under images/ + manifest are never pruned (kept forever)
          ./scripts/ci-s3.sh prune build 60d
