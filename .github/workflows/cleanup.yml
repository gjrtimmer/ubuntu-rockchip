name: Cleanup
run-name: Prune S3 CI handoffs

# Dedicated scheduled cleanup of the S3 CI-handoff prefix (ci/<run_id>/), instead of
# bolting a cleanup job onto every build pipeline. Runs daily and prunes anything older
# than max_age, so the prefix self-cleans even during quiet periods.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      max_age:
        description: "Delete ci/ handoff objects older than this (rclone duration, e.g. 90d)"
        default: "90d"
        type: string

jobs:
  prune:
    runs-on: [self-hosted, ARM64, RK1]
    name: Prune ci/ handoffs
    steps:
      - name: Reset workspace
        shell: bash
        run: sudo rm -rf ./build ./images || true

      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Prune ci/ handoffs and dated rootfs
        shell: bash
        env:
          S3_HOST: ${{ secrets.S3_HOST }}
          S3_CLIENT_ID: ${{ secrets.S3_CLIENT_ID }}
          S3_CLIENT_SECRET: ${{ secrets.S3_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          age="${{ inputs.max_age || '90d' }}"
          ./scripts/ci-s3.sh prune ci "${age}"
          # dated rootfs copies kept 3 months; latest.tar.xz is rewritten monthly so it stays fresh
          ./scripts/ci-s3.sh prune rootfs 90d
