# ESO ExternalSecret — pulls BOTH MinIO credential sets (CA + NL) from the shared
# cluster Vault (vault-shared ClusterSecretStore) into one k8s Secret. The CronJob
# envFrom's this Secret and the image entrypoint builds the mc aliases from it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-promote-cleanup
  namespace: storage
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-shared
    kind: ClusterSecretStore
  target:
    name: s3-promote-cleanup          # k8s Secret ESO creates; envFrom'd by the CronJob
    creationPolicy: Owner
  data:
    # CA (this cluster's MinIO)
    - secretKey: CAN_ACCESS_KEY
      remoteRef:
        key: storage/minio/can/superuser
        property: MINIO_ROOT_USER
    - secretKey: CAN_SECRET_KEY
      remoteRef:
        key: storage/minio/can/superuser
        property: MINIO_ROOT_PASSWORD
    # NL (public MinIO)
    - secretKey: NLD_ACCESS_KEY
      remoteRef:
        key: storage/minio/nld/superuser
        property: MINIO_ROOT_USER
    - secretKey: NLD_SECRET_KEY
      remoteRef:
        key: storage/minio/nld/superuser
        property: MINIO_ROOT_PASSWORD
